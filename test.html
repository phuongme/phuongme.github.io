<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIF TOKEN & SIFIRINCIFILO Ecosystem Investor Cryptocurrency</title>
    <link rel="icon" href="./assets/images/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="./assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <style>
        .btn__play {
            position: relative;
            color: #fff;
            height: 40px;
            width: 40px;
            line-height: 38px;
            font-size: 18px;
            text-align: center;
            border-radius: 50%;
            display: inline-block;
            background-image: linear-gradient(to right, #46bdf4 0%, #2b56f5 100%);
            border: none;
        }

        .btn__play--icon {
            height: 20px;
            width: 14px;
            background: linear-gradient(to right, #46bdf4 0%, #2b56f5 100%);
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-40%, -50%);
        }

        .btn__play--icon:before {
            top: 0;
            border-bottom: 10px solid transparent;
        }

        .btn__play--icon:before,
        .btn__play--icon:after {
            position: absolute;
            content: '';
            height: 0;
            width: 0;
            right: -1px;
            border-right: 14px solid #fff;
        }

        .btn__play--icon:after {
            bottom: 0;
            border-top: 10px solid transparent;
        }

        .btn__play--icon:before,
        .btn__play--icon:after {
            position: absolute;
            content: '';
            height: 0;
            width: 0;
            right: -1px;
            border-right: 14px solid #fff;
        }

        .btn__play::before {
            position: absolute;
            height: calc(100% - 4px);
            width: calc(100% - 4px);
            top: 2px;
            left: 2px;
            content: '';
            background: #fff;
            border-radius: 50%;
            z-index: 0;
        }

        .btn__play:after {
            position: absolute;
            content: "";
            height: calc(100% + 16px);
            width: calc(100% + 16px);
            top: -8px;
            left: -8px;
            border-radius: 50%;
            border: 1px solid rgba(40, 56, 76, 0.35);
            animation: 1s ease 0s normal none infinite running playbutton;
        }

        @keyframes playbutton {
            0% {
                transform: scale(0.75);
                opacity: 1;
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        @media (min-width: 576px) {
            .btn__play {
                height: 60px;
                width: 60px;
                line-height: 58px;
            }
        }
    </style>
</head>

<body>
    <div class="btn__play">
        <em class="btn__play--icon"></em>
    </div>

    <script src="./assets/vendor/jquery/jquery.min.js"></script>
    <script src="./assets/vendor/bootstrap/js/bootstrap.min.js"></script>
    <script src="./assets/vendor/particles/particles.min.js"></script>
    <script src="./assets/js/main.js"></script>
    <script>
        var $particles_bg = $('.particles-bg');
        if ($particles_bg.length > 0) {
            $particles_bg.each(function () {
                var $self = $(this), $self_id = $self.attr('id'),
                    _pt_base = ($self.data('pt-base')) ? $self.data('pt-base') : '#fff',
                    _pt_base_op = ($self.data('pt-base-op')) ? parseFloat($self.data('pt-base-op')) : 0.10,
                    _pt_shape = ($self.data('pt-shape')) ? $self.data('pt-shape') : '#fff',
                    _pt_shape_op = ($self.data('pt-shape-op')) ? parseFloat($self.data('pt-shape-op')) : 0.10,
                    _pt_line = ($self.data('pt-line')) ? $self.data('pt-line') : '#fff',
                    _pt_line_op = ($self.data('pt-line-op')) ? parseFloat($self.data('pt-line-op')) : 0.20;

                particlesJS($self_id, {
                    "particles": {
                        "number": {
                            "value": 30,
                            "density": {
                                "enable": true,
                                "value_area": 800
                            }
                        },
                        "color": {
                            "value": _pt_base,
                        },
                        "shape": {
                            "type": "circle",
                            "opacity": _pt_shape_op,
                            "stroke": {
                                "width": 0,
                                "color": _pt_shape,
                            },
                            "polygon": {
                                "nb_sides": 5
                            }
                        },
                        "opacity": {
                            "value": _pt_base_op,
                            "random": false,
                            "anim": {
                                "enable": false,
                                "speed": 1,
                                "opacity_min": 0.12,
                                "sync": false
                            }
                        },
                        "size": {
                            "value": 6,
                            "random": true,
                            "anim": {
                                "enable": false,
                                "speed": 40,
                                "size_min": 0.08,
                                "sync": false
                            }
                        },
                        "line_linked": {
                            "enable": true,
                            "distance": 150,
                            "color": _pt_line,
                            "opacity": _pt_line_op,
                            "width": 1.3
                        },
                        "move": {
                            "enable": true,
                            "speed": 6,
                            "direction": "none",
                            "random": false,
                            "straight": false,
                            "out_mode": "out",
                            "bounce": false,
                            "attract": {
                                "enable": false,
                                "rotateX": 600,
                                "rotateY": 1200
                            }
                        }
                    },
                    "interactivity": {
                        "detect_on": "canvas",
                        "events": {
                            "onhover": {
                                "enable": true,
                                "mode": "repulse"
                            },
                            "onclick": {
                                "enable": true,
                                "mode": "push"
                            },
                            "resize": true
                        },
                        "modes": {
                            "grab": {
                                "distance": 400,
                                "line_linked": {
                                    "opacity": 1
                                }
                            },
                            "bubble": {
                                "distance": 400,
                                "size": 40,
                                "duration": 2,
                                "opacity": 8,
                                "speed": 3
                            },
                            "repulse": {
                                "distance": 200,
                                "duration": 0.4
                            },
                            "push": {
                                "particles_nb": 4
                            },
                            "remove": {
                                "particles_nb": 2
                            }
                        }
                    },
                    "retina_detect": true
                }
                    // Stop here.
                );
            });
        }
    </script>
</body>

</html>
