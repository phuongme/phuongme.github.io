    <style>
        .progress {
            box-sizing: content-box;
            height: 30px;
            position: relative;
            margin: 60px 0 20px 0;
            background: #000;
            border-radius: 30px;
            padding: 10px;
            box-shadow: inset 0 -1px 1px rgb(255 255 255 / 30%);
            line-height: 30px;
        }

        .progress__blue>span {
            background-image: linear-gradient(#5b75f9, #4ab1f6);
        }



        .progress>span {
            display: block;
            height: 100%;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            background-color: rgb(43, 194, 83);
            background-image: linear-gradient(center bottom, rgb(43, 194, 83) 37%, rgb(84, 240, 84) 69%);
            box-shadow: inset 0 2px 9px rgb(255 255 255 / 30%), inset 0 -2px 6px rgb(0 0 0 / 40%);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .progress>span:after,
        .progress__animate>span>span {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background-image: linear-gradient(-45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent);
            z-index: 1;
            background-size: 50px 50px;
            animation: move 2s linear infinite;
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            overflow: hidden;
        }

        .progress__nostripes>span>span,
        .progress__nostripes>span::after {
            background-image: none;
        }
    </style>
</head>

<body style="background-color: black;">
    <div id="particles-js" class="particles-bg"></div>

    <div class="progress progress__blue progress__nostripes">
        <span style="width:85%">%92</span>

    <script>
        var $particles_bg = $('.particles-bg');
        if ($particles_bg.length > 0) {

                particlesJS($self_id, {
                    "particles": {
                        "number": {

                            "density": {
                                "enable": true,
                                "value_area": 800

                        },

                        },

                        },
                        "line_linked": {

                }
                    // Stop here.
                );

        }
    </script>
